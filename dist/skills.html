      '</div>' +
      '<div class="skill-desc">' + escapeHtml(s.desc) + '</div>' +
      '<div class="skill-meta">' +

            '<val>' + (s.stars || '0') + '</val>' +
          '</span>' +
          '<span class="skill-stat">' +
            '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5C4.14 1.5 1 7 1 7s3.14 5.5 7 5.5S15 7 15 7s-3.14-5.5-7-5.5zM8 10a3 3 0 110-6 3 3 0 010 6z" fill-rule="evenodd"/></svg>' +
            '<val>' + (s.downloads || '0') + '</val>' +

      '<div class="skill-footer">' +
        '<button class="skill-install-btn" data-cmd="' + escapeHtml(installCmd) + '" onclick="copyCmd(this)">' +
          'skillai install ' + escapeHtml(s.author) + '/' + escapeHtml(s.slug || s.name.toLowerCase().replace(/\s+/g, '-')) +
        '</button>' +
        '<button class="skill-copy-btn" onclick="copyCmd(this.previousElementSibling)" title="婢跺秴鍩楅崨鎴掓姢">??</button>' +
      '</div>' +
    '</div>';
  }).join('');
  document.getElementById('totalCount').textContent = skills.length;
  document.getElementById('skillsSkeleton').style.display = 'none';
}

// ============================================================
// Copy command
// ============================================================
function copyCmd(btn) {
  const cmd = btn.getAttribute('data-cmd') || btn.textContent.trim();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(cmd).then(function() {
      showCopied(btn);
    }).catch(function() {
      fallbackCopy(cmd, btn);
    });
  } else {
    fallbackCopy(cmd, btn);
  }
}

function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showCopied(btn);
  } catch (e) {
    showToast('婢跺秴鍩楁径杈Е閿涘矁顕幍瀣З婢跺秴鍩?);
  }
  document.body.removeChild(ta);
}

function showCopied(btn) {
  const orig = btn.textContent;
  btn.classList.add('copied');
  btn.textContent = '? 瀹告彃顦查崚?;
  showToast('瀹告彃顦查崚? ' + (btn.getAttribute('data-cmd') || btn.textContent.replace('? 瀹告彃顦查崚?, '').trim()));
  setTimeout(function() {
    btn.classList.remove('copied');
    btn.textContent = orig;
  }, 2000);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// ============================================================
// Filter
// ============================================================
document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    this.classList.add('active');
    var filter = this.getAttribute('data-filter');
    document.querySelectorAll('.skill-card').forEach(function(card) {
      if (filter === 'all' || card.getAttribute('data-cat') === filter) {
        card.classList.remove('hidden');
      } else {
        card.classList.add('hidden');
      }
    });
  });
});

// ============================================================
// Init
// ============================================================
renderSkills(skillsData);
</script>
