/* ===== 首页专用样式 ===== */

/* Day-in-Life Section */
.day-section {
  padding: 48px 0;
  background: linear-gradient(180deg, #0d1320 0%, #0a0e17 100%);
}
.day-section .section-header {
  margin-bottom: 40px;
}
.day-timeline {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 16px;
  position: relative;
}
.day-timeline::before {
  content: '';
  position: absolute;
  left: 23px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, #00d4ff, rgba(0,212,255,0.1));
}
.day-item {
  display: flex;
  gap: 20px;
  margin-bottom: 28px;
  position: relative;
}
.day-time {
  width: 48px;
  flex-shrink: 0;
  text-align: center;
  padding-top: 2px;
}
.day-time-text {
  font-size: 0.72rem;
  color: #00d4ff;
  font-weight: 700;
  background: #0a0e17;
  padding: 2px 0;
}
.day-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #00d4ff;
  border: 2px solid #0a0e17;
  position: absolute;
  left: 18px;
  top: 4px;
  z-index: 1;
}
.day-content {
  background: #0f1623;
  border: 1px solid rgba(0,212,255,0.15);
  border-radius: 12px;
  padding: 14px 16px;
  flex: 1;
}
.day-content h3 {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.day-content p {
  font-size: 0.82rem;
  color: #8899aa;
  line-height: 1.5;
}

/* Interface Showcase */
.showcase-section {
  padding: 48px 0;
}
.showcase-section .section-header {
  margin-bottom: 32px;
}
.showcase-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  padding: 0 16px;
  max-width: 800px;
  margin: 0 auto;
}
.showcase-card {
  background: #0f1623;
  border: 1px solid rgba(0,212,255,0.15);
  border-radius: 16px;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.showcase-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,212,255,0.1);
}
.showcase-screen {
  background: linear-gradient(135deg, #1a2535 0%, #0d1825 100%);
  padding: 20px;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.showcase-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}
.showcase-bar-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
.showcase-bar-dot.red { background: #ff5f57; }
.showcase-bar-dot.yellow { background: #febc2e; }
.showcase-bar-dot.green { background: #28c840; }
.showcase-bar-title {
  margin-left: 8px;
  font-size: 0.72rem;
  color: #556677;
  font-family: "Courier New", monospace;
}
.showcase-line {
  height: 8px;
  border-radius: 4px;
  background: rgba(0,212,255,0.1);
  overflow: hidden;
}
.showcase-line-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, #00d4ff, #0088aa);
}
.showcase-msg {
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.showcase-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(0,212,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  flex-shrink: 0;
}
.showcase-bubble {
  background: rgba(0,212,255,0.1);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 10px 10px 10px 2px;
  padding: 8px 12px;
  font-size: 0.78rem;
  color: #aabbcc;
  line-height: 1.4;
  flex: 1;
}
.showcase-bubble.ai {
  background: rgba(0,212,255,0.08);
  border-color: rgba(0,212,255,0.15);
}
.showcase-info {
  padding: 14px 16px;
}
.showcase-info h3 {
  font-size: 0.92rem;
  font-weight: 600;
  margin-bottom: 4px;
}
.showcase-info p {
  font-size: 0.8rem;
  color: #8899aa;
  line-height: 1.4;
}

/* Quick Start Banner */
.banner-section {
  padding: 0 16px 48px;
  max-width: 800px;
  margin: 0 auto;
}
.quick-banner {
  background: linear-gradient(135deg, rgba(0,212,255,0.12), rgba(0,136,170,0.08));
  border: 1px solid rgba(0,212,255,0.25);
  border-radius: 16px;
  padding: 28px 24px;
  text-align: center;
}
.quick-banner h3 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 8px;
}
.quick-banner p {
  font-size: 0.88rem;
  color: #8899aa;
  margin-bottom: 20px;
  line-height: 1.5;
}
.quick-banner .btn {
  display: inline-block;
  min-width: 180px;
}

/* Stats Bar */
.stats-bar {
  background: #0d1520;
  border-top: 1px solid rgba(0,212,255,0.1);
  border-bottom: 1px solid rgba(0,212,255,0.1);
  padding: 20px 16px;
}
.stats-bar-inner {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  gap: 16px;
}
.stats-bar-item {
  text-align: center;
}
.stats-bar-num {
  font-size: 1.4rem;
  font-weight: 800;
  color: #00d4ff;
  display: block;
}
.stats-bar-label {
  font-size: 0.75rem;
  color: #8899aa;
  display: block;
}

/* Version badge */
.version-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(0,212,255,0.08);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 50px;
  padding: 3px 10px;
  font-size: 0.72rem;
  color: #00d4ff;
  margin-bottom: 16px;
}
.version-badge::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #00d4ff;
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ===== AI Models Section - 鲜艳动态版 ===== */
.models-section { overflow: hidden; padding: 48px 0; }
.models-scroll-wrap {
  overflow-x: auto;
  padding: 0 16px 16px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.models-scroll-wrap::-webkit-scrollbar { display: none; }
.models-strip {
  display: flex;
  gap: 16px;
  min-width: min-content;
  padding-bottom: 8px;
}
.models-carousel {
  overflow: hidden;
  position: relative;
  width: 100%;
  padding: 20px 0;
}
.models-carousel:hover .models-strip {
  animation-play-state: paused;
}
.models-carousel .models-strip {
  animation: modelScroll 30s linear infinite;
  cursor: grab;
}
.models-carousel .models-strip:active {
  cursor: grabbing;
}
@keyframes modelScroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.model-big-card {
  min-width: 200px;
  max-width: 200px;
  background: #0f1623;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 20px 16px;
  text-align: center;
  position: relative;
  transition: all 0.3s ease;
  flex-shrink: 0;
}
.model-big-card:hover {
  transform: translateY(-6px) scale(1.03);
  border-color: var(--c, #00d4ff);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 30px rgba(0,212,255,0.1);
}</style>
