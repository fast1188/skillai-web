<!DOCTYPE html><html style="background:#0a0e1a"><head><meta charset="utf-8"/><style>
body{margin:0;padding:0;background:#050810;width:400px;height:240px;display:flex;justify-content:center;align-items:center;overflow:hidden;}
</style></head><body style="background:#0a0e1a">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4D4D"/>
      <stop offset="50%" style="stop-color:#FF3366"/>
      <stop offset="100%" style="stop-color:#00F5D4"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="400" height="240" fill="#050810"/>

  <!-- ===== SIMPLE CRAB CHARACTER ===== -->
  <g transform="translate(200,85)">
    
    <!-- Main round body - flat red -->
    <circle cx="0" cy="0" r="48" fill="#FF3333"/>
    
    <!-- Subtle highlight - top left only -->
    <ellipse cx="-15" cy="-18" rx="12" ry="8" fill="#FF6B6B" opacity="0.5"/>
    
    <!-- Left eye -->
    <circle cx="-16" cy="-4" r="5.5" fill="#1A1A2E"/>
    <circle cx="-14" cy="-6" r="2" fill="white"/>
    
    <!-- Right eye -->
    <circle cx="16" cy="-4" r="5.5" fill="#1A1A2E"/>
    <circle cx="18" cy="-6" r="2" fill="white"/>
    
    <!-- Simple smile -->
    <path d="M-7,7 Q0,15 7,7" fill="none" stroke="#1A1A2E" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Left claw -->
    <g transform="translate(-51,3) rotate(-20)">
      <ellipse cx="0" cy="0" rx="12" ry="7" fill="#FF3333"/>
    </g>
    
    <!-- Right claw -->
    <g transform="translate(51,3) rotate(20)">
      <ellipse cx="0" cy="0" rx="12" ry="7" fill="#FF3333"/>
    </g>
    
    <!-- Left leg -->
    <ellipse cx="-16" cy="51" rx="8" ry="5" fill="#FF3333"/>
    
    <!-- Right leg -->
    <ellipse cx="16" cy="51" rx="8" ry="5" fill="#FF3333"/>
  </g>

  <!-- Brand name -->
  <text x="200" y="168" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="42" fill="url(#textGrad)" letter-spacing="3">OpenClaw</text>

  <!-- Tagline -->
  <text x="200" y="202" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="12" fill="#8899AA" letter-spacing="6" opacity="0.85">AI &#xb7; PERSONAL &#xb7; ASSISTANT</text>
</svg>

</body></html>
