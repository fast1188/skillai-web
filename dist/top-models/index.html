  {rank:3,name:'Claude Sonnet 4.6',maker:'Anthropic',emoji:'🤖',cat:'对话',color:'#b060ff',scores:{reasoning:95,coding:93,creativity:96,speed:88,cost:72},price:'输入 $3/输出 $15',ctx:'20万',hot:true,trend:'stable',desc:'对话体验最自然，长上下文理解能力出色。'},

  {rank:5,name:'Kimi K2.6',maker:'月之暗面',emoji:'📖',cat:'长文',color:'#ffd93d',scores:{reasoning:88,coding:82,creativity:90,speed:85,cost:88},price:'输入 ¥0.06/输出 ¥0.12',ctx:'200万',hot:false,trend:'up',desc:'超长上下文处理能力领先，适合文档分析。'},
  {rank:6,name:'Qwen 3',maker:'阿里云',emoji:'🤖',cat:'通用',color:'#ff8c42',scores:{reasoning:89,coding:90,creativity:87,speed:91,cost:93},price:'输入 ¥0.04/输出 ¥0.12',ctx:'128K',hot:false,trend:'stable',desc:'阿里云出品，多模态能力强，生态完善。'},
  {rank:7,name:'Doubao Pro',maker:'字节跳动',emoji:'🎨',cat:'创意',color:'#ff4757',scores:{reasoning:85,coding:80,creativity:94,speed:93,cost:95},price:'输入 ¥0.03/输出 ¥0.09',ctx:'128K',hot:false,trend:'up',desc:'字节跳动出品，创意生成能力突出，价格最低。'},
  {rank:8,name:'GPT-4o',maker:'OpenAI',emoji:'🤖',cat:'通用',color:'#00d4ff',scores:{reasoning:94,coding:92,creativity:91,speed:90,cost:65},price:'输入 $2.5/输出 $10',ctx:'128K',hot:false,trend:'stable',desc:'OpenAI多模态旗舰，综合能力强劲。'}
];

const LABELS = {reasoning:'推理',coding:'编程',creativity:'创意',speed:'速度',cost:'成本'};

function renderModels() {
  const el = document.getElementById('topContainer');
  if(!el) return;
  el.innerHTML = MODELS.map((m,i) => {
    const scoresHtml = Object.entries(m.scores).map(([k,v]) =>
      '<div class="score-item"><span class="score-label">'+(LABELS[k]||k)+'</span><div class="score-bar"><div class="score-fill" id="fill-'+i+'-'+k+'" style="width:0%;background:linear-gradient(90deg,'+m.color+','+m.color+'cc)"></div></div><span class="score-val" id="val-'+i+'-'+k+'">0</span></div>'
    ).join('');
    const trendIcon = m.trend === 'up' ? '📈' : '➡️';
    return '<div class="top-card" style="--card-color:'+m.color+';opacity:0;transform:translateY(40px)" id="card-'+i+'" onclick="toggleDetail(this)">'
      +'<div class="top-card-glow" style="background:radial-gradient(ellipse at 50% 0%,'+m.color+'15 0%,transparent 70%)"></div>'
      +'<div class="top-card-rank">#'+m.rank+'</div>'
      +'<div class="top-card-icon">'+m.emoji+'</div>'
      +'<div class="top-card-header"><h3>'+m.name+'</h3><span class="top-card-maker">'+m.maker+'</span>'
      +(m.hot?'<span class="model-badge-hot">🔥热门</span>':'')
      +'<span class="top-card-trend">'+trendIcon+'</span></div>'
      +'<div class="top-card-cat">'+m.cat+'</div>'
      +'<div class="top-card-scores">'+scoresHtml+'</div>'
      +'<div class="top-card-detail" style="display:none">'
      +'<p class="top-card-desc">'+m.desc+'</p>'
      +'<div class="top-card-meta"><span>📏 上下文 '+m.ctx+'</span><span>💰'+m.price+' /1M tokens</span></div>'
      +'</div>'
      +'<div class="top-card-expand">点击查看详情 ▾</div>'
      +'</div>';
  }).join('');

  MODELS.forEach(function(_,i) {
    setTimeout(function() {
      var card = document.getElementById('card-'+i);
      if(card) {
        card.style.transition = 'all 0.6s cubic-bezier(0.34,1.56,0.64,1)';
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }
      setTimeout(function() { animateScores(i); }, 200);
    }, i * 150);
  });
}

function animateScores(idx) {
  var m = MODELS[idx];
  Object.entries(m.scores).forEach(function(pair) {
    var k = pair[0], target = pair[1];
    var fill = document.getElementById('fill-'+idx+'-'+k);
    var val = document.getElementById('val-'+idx+'-'+k);
    if (!fill || !val) return;
    var current = 0;
    var step = target / 20;
    var timer = setInterval(function() {
      current += step;
      if (current >= target) { current = target; clearInterval(timer); }
      fill.style.width = current + '%';
      val.textContent = Math.round(current);
    }, 30);
  });
}

function toggleDetail(card) {
  var d = card.querySelector('.top-card-detail');
  var e = card.querySelector('.top-card-expand');
  if (!d) return;
  var show = d.style.display !== 'block';
  d.style.display = show ? 'block' : 'none';
  d.style.animation = show ? 'fadeSlideIn 0.35s ease' : 'none';
  e.textContent = show ? '收起详情 ▴' : '点击查看详情 ▾';
}

document.addEventListener('DOMContentLoaded', function() {
  renderModels();
  // Nav toggle
  var toggle = document.getElementById('navToggle');
  if (toggle) {
    toggle.addEventListener('click', function() {
      var links = document.querySelector('.nav-links');
      if (links) links.classList.toggle('open');
    });
  }
});
</script>
