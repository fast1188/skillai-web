<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 40" fill="none">
  <defs>
    <linearGradient id="clawGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0077cc"/>
    </linearGradient>
    <linearGradient id="clawGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- 外圈光晕 -->
  <circle cx="20" cy="18" r="17" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="20" cy="18" r="20" fill="none" stroke="#00d4ff" stroke-width="0.3" opacity="0.06"/>

  <!-- 青蓝螃蟹图标 -->
  <g transform="translate(4,2)">
    <circle cx="16" cy="16" r="15" fill="url(#clawGrad)" opacity="0.95"/>
    <!-- 龙虾钳子形状 -->
    <path d="M8 10 C4 6, 8 2, 12 6 L14 4 C16 2, 20 4, 18 8 L16 10" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M14 10 C16 14, 14 20, 10 22 C8 23, 6 20, 8 18 C10 16, 12 16, 12 14" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M20 12 C24 10, 26 14, 22 16" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.9"/>
    <!-- 眼睛 -->
    <circle cx="10" cy="11" r="2" fill="white"/>
    <circle cx="10" cy="11" r="1" fill="#0a1628"/>
  </g>

  <!-- 文字 -->
  <text x="42" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#E8EDF5">Open</text>
  <text x="95" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="300" fill="#667788">Claw</text>
</svg>
