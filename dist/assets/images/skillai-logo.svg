<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
  </defs>

  <!-- 图标：S 形闪电/AI符号 -->
  <g transform="translate(4,4)">
    <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#iconGrad)" opacity="0.15"/>
    <rect x="0" y="0" width="48" height="48" rx="12" stroke="url(#iconGrad)" stroke-width="1.5" fill="none"/>
    <!-- S 形路径 -->
    <path d="M24 12 C18 12, 16 16, 16 20 C16 24, 20 26, 24 28 C28 30, 32 32, 32 36 C32 40, 28 44, 24 44 C20 44, 18 40, 18 36" stroke="url(#iconGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- AI 小点 -->
    <circle cx="36" cy="16" r="3" fill="#00d4ff" opacity="0.8"/>
  </g>

  <!-- 文字 SkillAI -->
  <text x="60" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="700" fill="url(#logoGrad)" letter-spacing="1">Skill</text>
  <text x="145" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="300" fill="#8899aa" letter-spacing="1">AI</text>

  <!-- 副标题 -->
  <text x="60" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#556677">API Relay</text>
</svg>
